spring.application.name=sistema-yess

spring.datasource.url=jdbc:mysql://localhost:3306/YessGelatinas?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway maneja el schema — ddl-auto solo valida que el modelo Java coincida con la BD
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway: la BD ya existe, se marca como baseline en V1 y Flyway aplica desde V2 en adelante
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Credenciales del sistema (cambiar antes de usar)
app.security.username=admin
app.security.password=yess2024

# Backup
app.backup.folder=C:/YessBackups
app.backup.mysqldump-path=C:/Program Files/MySQL/MySQL Server 8.0/bin/mysqldump
